<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODASURE - Barangay Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .swal2-popup{background:#0f172a!important;color:#f1f5f9!important}
        .swal2-title{color:#f1f5f9!important}
        .swal2-html-container{color:#94a3b8!important}
    </style>
</head>
<body>
    <button class="sidebar-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-icon"><i class="fa-solid fa-shield-halved"></i></div>
                <div>
                    <h2>TODASURE</h2>
                    <span id="brgyLabel">Barangay</span>
                </div>
            </div>
            <nav>
                <a href="dashboard.html" class="active"><i class="fa-solid fa-gauge icon"></i> Dashboard</a>
                <a href="drivers.html"><i class="fa-solid fa-id-card icon"></i> Drivers</a>
                <a href="tricycles.html"><i class="fa-solid fa-motorcycle icon"></i> Tricycles</a>
                <a href="complaints.html"><i class="fa-solid fa-triangle-exclamation icon"></i> Complaints</a>
                <a href="violations.html"><i class="fa-solid fa-gavel icon"></i> Violations</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-header">
                <span class="page-title" id="pageTitle">Barangay Dashboard</span>
                <div class="header-actions">
                    <button class="header-icon-btn" id="notifBtn"><i class="fa-solid fa-bell"></i></button>
                    <div class="profile-dropdown">
                        <button class="profile-btn" id="profileBtn">
                            <div class="profile-avatar" id="profileInitial">B</div>
                            <div class="profile-info">
                                <div class="profile-name" id="profileName">Barangay</div>
                                <div class="profile-role">Barangay Official</div>
                            </div>
                            <i class="fa-solid fa-chevron-down chevron"></i>
                        </button>
                        <div class="dropdown-menu" id="profileMenu">
                            <a href="#"><i class="fa-solid fa-user"></i> Account Profile</a>
                            <div class="divider"></div>
                            <button class="danger" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="page-body">
                <!-- Stats -->
                <div class="stat-grid">
                    <div class="stat-card"><div class="stat-icon purple"><i class="fa-solid fa-id-card"></i></div><div class="stat-info"><h3 id="statDrivers">0</h3><p>Drivers</p></div></div>
                    <div class="stat-card"><div class="stat-icon blue"><i class="fa-solid fa-motorcycle"></i></div><div class="stat-info"><h3 id="statTricycles">0</h3><p>Tricycles</p></div></div>
                    <div class="stat-card"><div class="stat-icon green"><i class="fa-solid fa-route"></i></div><div class="stat-info"><h3 id="statTrips">0</h3><p>Trips Today</p></div></div>
                    <div class="stat-card"><div class="stat-icon orange"><i class="fa-solid fa-peso-sign"></i></div><div class="stat-info"><h3 id="statRevenue">&#8369;0</h3><p>Revenue</p></div></div>
                    <div class="stat-card"><div class="stat-icon pink"><i class="fa-solid fa-triangle-exclamation"></i></div><div class="stat-info"><h3 id="statComplaints">0</h3><p>Complaints</p></div></div>
                    <div class="stat-card"><div class="stat-icon red"><i class="fa-solid fa-gavel"></i></div><div class="stat-info"><h3 id="statViolations">0</h3><p>Violations</p></div></div>
                </div>

                <!-- Recent Trips -->
                <div class="card">
                    <div class="card-header"><h3><i class="fa-solid fa-clock-rotate-left" style="color:var(--accent);margin-right:6px"></i> Recent Trips</h3></div>
                    <div class="table-container">
                        <table><thead><tr><th>ID</th><th>Driver</th><th>Plate</th><th>Distance</th><th>Fare</th><th>Status</th><th>Date</th></tr></thead>
                        <tbody id="tripsTable"><tr><td colspan="7" class="text-center text-muted" style="padding:30px">Loading...</td></tr></tbody></table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/guard.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        // ── Common UI ──
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('show');
            this.classList.add('hide');
        });
        document.getElementById('sidebarOverlay').addEventListener('click', function() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');
            document.getElementById('sidebarToggle').classList.remove('hide');
        });
        document.getElementById('profileBtn').addEventListener('click', function(e) { e.stopPropagation(); document.getElementById('profileMenu').classList.toggle('show'); });
        document.addEventListener('click', function() { document.getElementById('profileMenu').classList.remove('show'); });

        (async function() {
            try {
                var s = await auth.session();
                if (s.role !== 'barangay' && s.role !== 'admin') { window.location.replace('/TodaShare/login.html'); return; }
                var n = ((s.first_name||'') + ' ' + (s.last_name||'')).trim();
                document.getElementById('profileName').textContent = n || 'Barangay';
                document.getElementById('profileInitial').textContent = (s.first_name||'B')[0].toUpperCase();
            } catch(e) { window.location.replace('/TodaShare/login.html'); }
        })();

        window.showAlert = function(msg, type) {
            Swal.mixin({ toast:true, position:'top-end', showConfirmButton:false, timer:3000, timerProgressBar:true })
                .fire({ icon: type==='error'?'error':'success', title: msg });
        };

        async function handleLogout() {
            var r = await Swal.fire({ title:'Logout?', icon:'question', showCancelButton:true, confirmButtonColor:'#00e6a0', confirmButtonText:'Yes' });
            if (r.isConfirmed) { await auth.logout(); localStorage.removeItem('user'); window.location.replace('/TodaShare/login.html'); }
        }

        document.getElementById('notifBtn').addEventListener('click', function() {
            Swal.fire({ title:'Notifications', html:'<p>'+document.getElementById('statComplaints').textContent+' pending complaints</p><p>'+document.getElementById('statViolations').textContent+' pending violations</p>', icon:'info', confirmButtonColor:'#00e6a0' });
        });

        // ── Data ──
        async function loadDashboard() {
            try {
                var s = await apiRequest('dashboard/barangay-stats.php');

                document.getElementById('brgyLabel').textContent = 'Brgy. ' + s.barangay_name;
                document.getElementById('pageTitle').textContent = 'Brgy. ' + s.barangay_name;
                document.getElementById('statDrivers').textContent = s.total_drivers;
                document.getElementById('statTricycles').textContent = s.total_tricycles;
                document.getElementById('statTrips').textContent = s.trips_today;
                document.getElementById('statRevenue').textContent = formatCurrency(s.revenue_today);
                document.getElementById('statComplaints').textContent = s.pending_complaints;
                document.getElementById('statViolations').textContent = s.pending_violations;

                // Recent trips
                var tb = document.getElementById('tripsTable');
                var list = s.recent_trips || [];
                if (!list.length) { tb.innerHTML = '<tr><td colspan="7" class="text-center text-muted" style="padding:30px">No trips yet</td></tr>'; }
                else {
                    tb.innerHTML = list.map(t => `<tr>
                        <td>#${t.id}</td><td>${t.first_name} ${t.last_name}</td><td>${t.plate_number||'-'}</td>
                        <td>${t.distance_km?t.distance_km+' km':'-'}</td>
                        <td>${t.actual_fare?formatCurrency(t.actual_fare):'-'}</td>
                        <td><span class="badge badge-${t.status}">${t.status}</span></td>
                        <td>${formatDate(t.started_at)}</td>
                    </tr>`).join('');
                }
            } catch (err) { showAlert(err.message, 'error'); }
        }

        // ── Init ──
        loadDashboard();
    </script>
</body>
</html>
