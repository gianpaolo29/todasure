<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODASURE - Violations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root{--b-bg:#f0f2f5;--b-card:#ffffff;--b-text:#1a1a2e;--b-text2:#4a5568;--b-text3:#a0aec0;--b-border:#e8ecf1;--b-green:#10b981;--b-green-bg:rgba(16,185,129,.08);--b-green-light:#d1fae5;--b-shadow:0 2px 12px rgba(0,0,0,.06);--b-shadow-lg:0 8px 30px rgba(0,0,0,.08)}
        [data-theme="dark"]{--b-bg:#0f172a;--b-card:#1e293b;--b-text:#f1f5f9;--b-text2:#94a3b8;--b-text3:#64748b;--b-border:#334155;--b-green:#10b981;--b-green-bg:rgba(16,185,129,.12);--b-green-light:rgba(16,185,129,.15);--b-shadow:0 2px 12px rgba(0,0,0,.3);--b-shadow-lg:0 8px 30px rgba(0,0,0,.4)}

        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--b-bg);color:var(--b-text);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}

        .topnav{position:sticky;top:0;z-index:50;background:var(--b-card);border-bottom:1px solid var(--b-border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--b-shadow)}
        .topnav-brand{display:flex;align-items:center;gap:10px}
        .topnav-brand .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--b-green),#059669);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px}
        .topnav-brand h1{font-size:18px;font-weight:800;color:var(--b-green)}
        .topnav-brand .brgy-name{font-size:11px;color:var(--b-text3);font-weight:500}
        .topnav-links{display:flex;gap:4px}
        .topnav-links a{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;color:var(--b-text2);text-decoration:none;transition:all .2s}
        .topnav-links a:hover{background:var(--b-green-bg);color:var(--b-green)}
        .topnav-links a.active{background:var(--b-green);color:#fff}
        .topnav-right{display:flex;align-items:center;gap:12px}
        .topnav-right .icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--b-border);background:var(--b-card);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--b-text2);font-size:15px;transition:all .2s;position:relative}
        .topnav-right .icon-btn:hover{background:var(--b-green-bg);color:var(--b-green);border-color:var(--b-green)}
        .notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:#ef4444;border-radius:50%;display:none}
        .user-btn{display:flex;align-items:center;gap:10px;padding:6px 12px 6px 6px;border-radius:12px;border:1px solid var(--b-border);background:var(--b-card);cursor:pointer;transition:all .2s}
        .user-btn:hover{border-color:var(--b-green)}
        .user-avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--b-green),#059669);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
        .user-name{font-size:13px;font-weight:600;color:var(--b-text)}
        .profile-dropdown{position:relative}
        .dropdown-menu{position:absolute;right:0;top:calc(100% + 8px);min-width:200px;background:var(--b-card);border:1px solid var(--b-border);border-radius:12px;box-shadow:var(--b-shadow-lg);display:none;z-index:60;overflow:hidden}
        .dropdown-menu.show{display:block}
        .dropdown-menu .dd-info{padding:12px 16px;border-bottom:1px solid var(--b-border)}
        .dropdown-menu .dd-info .dd-name{font-size:14px;font-weight:600;color:var(--b-text)}
        .dropdown-menu .dd-info .dd-email{font-size:11px;color:var(--b-text3)}
        .dropdown-menu a,.dropdown-menu button{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;color:var(--b-text2);cursor:pointer;border:none;background:none;width:100%;font-family:inherit;text-decoration:none;text-align:left;transition:background .15s}
        .dropdown-menu a:hover,.dropdown-menu button:hover{background:var(--b-green-bg)}
        .dropdown-menu .divider{height:1px;background:var(--b-border);margin:4px 0}
        .dropdown-menu button.danger{color:#ef4444}
        .dropdown-menu button.danger:hover{background:rgba(239,68,68,.06)}

        .mobile-toggle{display:none;width:38px;height:38px;border-radius:10px;border:1px solid var(--b-border);background:var(--b-card);align-items:center;justify-content:center;cursor:pointer;color:var(--b-text2);font-size:16px}
        .mobile-nav{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.4);backdrop-filter:blur(4px)}
        .mobile-nav.show{display:block}
        .mobile-nav-panel{position:fixed;top:0;left:0;bottom:0;width:280px;background:var(--b-card);padding:20px;transform:translateX(-100%);transition:transform .3s ease;display:flex;flex-direction:column;gap:8px}
        .mobile-nav.show .mobile-nav-panel{transform:translateX(0)}
        .mobile-nav-panel a{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;font-size:14px;font-weight:500;color:var(--b-text2);text-decoration:none;transition:all .2s}
        .mobile-nav-panel a:hover{background:var(--b-green-bg)}
        .mobile-nav-panel a.active{background:var(--b-green);color:#fff}
        .mobile-nav-panel .nav-logo{display:flex;align-items:center;gap:10px;padding:8px 0 16px;border-bottom:1px solid var(--b-border);margin-bottom:8px}

        @media(max-width:768px){
            .topnav-links{display:none}
            .mobile-toggle{display:flex}
            .user-name{display:none}
        }

        .content{max-width:1200px;margin:0 auto;padding:24px}
        .page-card{background:var(--b-card);border-radius:16px;box-shadow:var(--b-shadow);border:1px solid var(--b-border);overflow:hidden;margin-bottom:20px}
        .page-card-header{padding:20px 24px 16px;display:flex;justify-content:space-between;align-items:center}
        .page-card-header h3{font-size:16px;font-weight:700;color:var(--b-text)}
        .filter-card{background:var(--b-card);border-radius:16px;box-shadow:var(--b-shadow);border:1px solid var(--b-border);padding:16px 24px;margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}

        .table-container{overflow-x:auto}
        .table-container table{width:100%;border-collapse:collapse}
        .table-container th{padding:12px 16px;text-align:left;font-size:12px;font-weight:600;color:var(--b-text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--b-border);background:var(--b-bg)}
        .table-container td{padding:12px 16px;font-size:13px;color:var(--b-text);border-bottom:1px solid var(--b-border)}
        .table-container tr:hover td{background:var(--b-green-bg)}
        .text-center{text-align:center}
        .text-muted{color:var(--b-text3)}

        .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all .2s;font-family:inherit}
        .btn-primary{background:var(--b-green);color:#fff}
        .btn-primary:hover{background:#059669}
        .btn-outline{background:var(--b-card);border:1px solid var(--b-border);color:var(--b-text2)}
        .btn-outline:hover{border-color:var(--b-green);color:var(--b-green)}
        .btn-danger{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
        .btn-danger:hover{background:#ef4444;color:#fff}
        .btn-sm{padding:6px 12px;font-size:12px}

        .form-control-inline{padding:9px 14px;border-radius:8px;border:1px solid var(--b-border);background:var(--b-card);color:var(--b-text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
        .form-control-inline:focus{border-color:var(--b-green)}
        select.form-control-inline{cursor:pointer}

        .pagination{display:flex;justify-content:center;align-items:center;gap:6px;padding:16px;flex-wrap:wrap}
        .pagination button{padding:6px 12px;border-radius:8px;border:1px solid var(--b-border);background:var(--b-card);color:var(--b-text);cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s}
        .pagination button:hover:not(:disabled):not(.active-page){border-color:var(--b-green);color:var(--b-green)}
        .pagination button.active-page{border-color:var(--b-green);background:var(--b-green);color:#fff;font-weight:600;cursor:default}
        .pagination button:disabled{background:var(--b-bg);color:var(--b-text3);cursor:not-allowed}

        @media(max-width:768px){
            .content{padding:16px}
            .topnav{padding:0 16px}
            .filter-card{padding:12px 16px}
        }

        .swal2-popup{background:var(--b-card)!important;color:var(--b-text)!important;border-radius:16px!important}
        .swal2-title{color:var(--b-text)!important}
        .swal2-html-container{color:var(--b-text2)!important}
    </style>
</head>
<body>
    <!-- Mobile Nav -->
    <div class="mobile-nav" id="mobileNav" onclick="closeMobileNav()">
        <div class="mobile-nav-panel" onclick="event.stopPropagation()">
            <div class="nav-logo">
                <div style="width:32px;height:32px;background:linear-gradient(135deg,var(--b-green),#059669);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px"><img src="../todasure-logo.jpg" style="width:100%;height:100%;object-fit:cover;border-radius:inherit"></div>
                <div><div style="font-size:16px;font-weight:800;color:var(--b-green)">TODASURE</div><div style="font-size:10px;color:var(--b-text3)" id="mobileLabel">Barangay</div></div>
            </div>
            <a href="dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="drivers.html"><i class="fa-solid fa-id-card"></i> Drivers</a>
            <a href="tricycles.html"><i class="fa-solid fa-motorcycle"></i> Tricycles</a>
            <a href="complaints.html"><i class="fa-solid fa-triangle-exclamation"></i> Complaints</a>
            <a href="violations.html" class="active"><i class="fa-solid fa-gavel"></i> Violations</a>
        </div>
    </div>

    <!-- Top Nav -->
    <nav class="topnav">
        <div style="display:flex;align-items:center;gap:16px">
            <button class="mobile-toggle" onclick="openMobileNav()"><i class="fa-solid fa-bars"></i></button>
            <div class="topnav-brand">
                <div class="logo-icon"><img src="../todasure-logo.jpg" style="width:100%;height:100%;object-fit:cover;border-radius:inherit"></div>
                <div>
                    <h1>TODASURE</h1>
                    <div class="brgy-name" id="brgyLabel">Barangay</div>
                </div>
            </div>
        </div>
        <div class="topnav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="drivers.html">Drivers</a>
            <a href="tricycles.html">Tricycles</a>
            <a href="complaints.html">Complaints</a>
            <a href="violations.html" class="active">Violations</a>
        </div>
        <div class="topnav-right">
            <button class="icon-btn" onclick="themeToggle()" id="themeBtn"><i class="fas fa-moon"></i></button>
            <button class="icon-btn" id="notifBtn"><i class="fa-solid fa-bell"></i><span class="notif-dot" id="notifDot"></span></button>
            <div class="profile-dropdown">
                <button class="user-btn" id="profileBtn">
                    <div class="user-avatar" id="profileInitial">B</div>
                    <span class="user-name" id="profileName">Barangay</span>
                </button>
                <div class="dropdown-menu" id="profileMenu">
                    <div class="dd-info">
                        <div class="dd-name" id="dropdownName">Barangay</div>
                        <div class="dd-email" id="dropdownEmail"></div>
                    </div>
                    <a href="#" onclick="openAdminProfile()"><i class="fa-solid fa-user"></i> Account Profile</a>
                    <div class="divider"></div>
                    <button class="danger" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="content">
        <div class="filter-card">
            <input type="text" id="searchInput" class="form-control-inline" placeholder="Search driver..." style="max-width:200px;flex:1">
            <select id="filterStatus" class="form-control-inline">
                <option value="">All Status</option>
                <option value="pending">Pending</option>
                <option value="confirmed">Confirmed</option>
                <option value="appealed">Appealed</option>
                <option value="resolved">Resolved</option>
            </select>
            <select id="filterType" class="form-control-inline">
                <option value="">All Types</option>
                <option value="fare_overcharge">Fare Overcharge</option>
                <option value="fare_undercharge">Fare Undercharge</option>
                <option value="unauthorized_route">Unauthorized Route</option>
                <option value="complaint_based">Complaint Based</option>
                <option value="other">Other</option>
            </select>
            <button class="btn btn-outline" onclick="currentPage=1;filterViolations()"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
        </div>

        <div class="page-card">
            <div class="page-card-header">
                <h3><i class="fa-solid fa-gavel" style="color:var(--b-green);margin-right:8px"></i>Violations <span id="violationCount" style="font-size:12px;color:var(--b-text3);font-weight:400"></span></h3>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Driver</th>
                            <th>Type</th>
                            <th>Description</th>
                            <th>Severity</th>
                            <th>Penalty</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="violationsTable">
                        <tr><td colspan="9" class="text-center text-muted">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
            <div id="pagination" class="pagination"></div>
        </div>
    </div>

    <!-- Update Modal -->
    <div class="modal-overlay" id="violationModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Update Violation</h2>
                <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="violationForm">
                <input type="hidden" id="violationId">
                <div class="form-row">
                    <div class="form-group">
                        <label>Status</label>
                        <select id="violationStatus" class="form-control">
                            <option value="pending">Pending</option>
                            <option value="confirmed">Confirmed</option>
                            <option value="appealed">Appealed</option>
                            <option value="resolved">Resolved</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Severity</label>
                        <select id="violationSeverity" class="form-control">
                            <option value="minor">Minor</option>
                            <option value="moderate">Moderate</option>
                            <option value="major">Major</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Penalty</label>
                    <input type="text" id="violationPenalty" class="form-control" placeholder="e.g., 1-day suspension">
                </div>
                <div style="display:flex;gap:10px;margin-top:8px">
                    <button type="button" class="btn btn-outline" style="flex:1;justify-content:center" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="flex:1;justify-content:center"><i class="fa-solid fa-check"></i> Update</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/guard.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        // ── Mobile Nav ──
        function openMobileNav() { document.getElementById('mobileNav').classList.add('show'); }
        function closeMobileNav() { document.getElementById('mobileNav').classList.remove('show'); }

        // ── Profile Dropdown ──
        document.getElementById('profileBtn').addEventListener('click', function(e) { e.stopPropagation(); document.getElementById('profileMenu').classList.toggle('show'); });
        document.addEventListener('click', function() { document.getElementById('profileMenu').classList.remove('show'); });

        // ── Theme Button ──
        function updateThemeBtn() {
            var btn = document.getElementById('themeBtn');
            if (!btn) return;
            var theme = document.documentElement.getAttribute('data-theme');
            btn.innerHTML = theme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }
        var _origToggle = window.themeToggle;
        window.themeToggle = function() { _origToggle(); updateThemeBtn(); };
        updateThemeBtn();

        // ── Load Profile ──
        (async function() {
            try {
                var s = await auth.session();
                if (s.role !== 'barangay' && s.role !== 'admin') { window.location.replace('/TodaShare/login.html'); return; }
                var n = ((s.first_name||'') + ' ' + (s.last_name||'')).trim();
                document.getElementById('profileName').textContent = n || 'Barangay';
                document.getElementById('profileInitial').textContent = (s.first_name||'B')[0].toUpperCase();
                var dn = document.getElementById('dropdownName'); if(dn) dn.textContent = n || 'Barangay';
                var de = document.getElementById('dropdownEmail'); if(de) de.textContent = s.email || '';
            } catch(e) { window.location.replace('/TodaShare/login.html'); }
        })();

        // ── Admin Profile ──
        async function openAdminProfile() {
            document.getElementById('profileMenu').classList.remove('show');
            try {
                const s = await auth.session();
                const { value: formData } = await Swal.fire({
                    title: 'Account Profile',
                    html: `<div style="text-align:left;font-size:13px">
                        <div style="text-align:center;margin-bottom:16px"><div style="width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#10b981,#059669);display:inline-flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff">${(s.first_name||'B')[0].toUpperCase()}</div></div>
                        <label style="display:block;margin-bottom:4px;font-weight:600;color:var(--b-text2)">First Name</label>
                        <input id="swal-fn" value="${s.first_name||''}" style="width:100%;padding:10px;border:1px solid var(--b-border);border-radius:8px;font-size:13px;margin-bottom:10px;background:var(--b-card);color:var(--b-text);font-family:inherit;outline:none">
                        <label style="display:block;margin-bottom:4px;font-weight:600;color:var(--b-text2)">Last Name</label>
                        <input id="swal-ln" value="${s.last_name||''}" style="width:100%;padding:10px;border:1px solid var(--b-border);border-radius:8px;font-size:13px;margin-bottom:10px;background:var(--b-card);color:var(--b-text);font-family:inherit;outline:none">
                        <label style="display:block;margin-bottom:4px;font-weight:600;color:var(--b-text2)">Email</label>
                        <input value="${s.email||''}" style="width:100%;padding:10px;border:1px solid var(--b-border);border-radius:8px;font-size:13px;margin-bottom:10px;background:var(--b-bg);color:var(--b-text3);font-family:inherit;outline:none" readonly>
                        <label style="display:block;margin-bottom:4px;font-weight:600;color:var(--b-text2)">Phone</label>
                        <input id="swal-ph" value="${s.phone||''}" placeholder="09xxxxxxxxx" style="width:100%;padding:10px;border:1px solid var(--b-border);border-radius:8px;font-size:13px;background:var(--b-card);color:var(--b-text);font-family:inherit;outline:none">
                    </div>`,
                    showCancelButton: true, confirmButtonText: 'Save Changes', confirmButtonColor: '#10b981', cancelButtonText: 'Close', cancelButtonColor: '#9ca3af',
                    preConfirm: () => ({ first_name: document.getElementById('swal-fn').value.trim(), last_name: document.getElementById('swal-ln').value.trim(), phone: document.getElementById('swal-ph').value.trim() })
                });
                if (formData) {
                    if (!formData.first_name) return Swal.fire({icon:'warning',title:'Required',text:'First name is required.',confirmButtonColor:'#10b981'});
                    await apiRequest('../api/auth/update-profile.php','POST',formData);
                    Swal.fire({icon:'success',title:'Profile Updated',confirmButtonColor:'#10b981'});
                    var nn = (formData.first_name + ' ' + formData.last_name).trim();
                    document.getElementById('profileName').textContent = nn;
                    document.getElementById('profileInitial').textContent = formData.first_name[0].toUpperCase();
                    var dn = document.getElementById('dropdownName'); if(dn) dn.textContent = nn;
                }
            } catch(err) { Swal.fire({icon:'error',title:'Error',text:err.message,confirmButtonColor:'#10b981'}); }
        }

        // ── Logout ──
        async function handleLogout() {
            var r = await Swal.fire({ title:'Do you want to logout?', text:'You will need to login again.', icon:'question', showCancelButton:true, confirmButtonColor:'#ef4444', confirmButtonText:'Yes, logout', cancelButtonText:'No', cancelButtonColor:'#9ca3af' });
            if (r.isConfirmed) { await auth.logout(); localStorage.removeItem('user'); window.location.replace('/TodaShare/login.html'); }
        }

        // ── Notifications ──
        document.getElementById('notifBtn').addEventListener('click', function() {
            Swal.fire({ title:'Notifications', html:'<p style="margin:4px 0">Check the dashboard for pending items.</p>', icon:'info', confirmButtonColor:'#10b981' });
        });

        // ── Data ──
        var allViolations = [];
        var filteredViolations = [];
        var currentPage = 1;
        var perPage = 15;

        function filterViolations() {
            var search = (document.getElementById('searchInput').value || '').trim().toLowerCase();
            var status = document.getElementById('filterStatus').value;
            var type = document.getElementById('filterType').value;

            filteredViolations = allViolations.filter(function(v) {
                if (status && v.status !== status) return false;
                if (type && (v.violation_type||v.type) !== type) return false;
                if (search) {
                    var driver = ((v.driver_first_name||v.first_name||'') + ' ' + (v.driver_last_name||v.last_name||'')).toLowerCase();
                    if (!driver.includes(search)) return false;
                }
                return true;
            });
            renderPage();
        }

        function renderPage() {
            var totalPages = Math.max(1, Math.ceil(filteredViolations.length / perPage));
            if (currentPage > totalPages) currentPage = totalPages;
            var start = (currentPage - 1) * perPage;
            var pageItems = filteredViolations.slice(start, start + perPage);
            document.getElementById('violationCount').textContent = '(' + filteredViolations.length + ' total)';

            var tbody = document.getElementById('violationsTable');
            if (pageItems.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted">No violations found</td></tr>';
            } else {
                tbody.innerHTML = pageItems.map(function(v) {
                    var driverName = ((v.driver_first_name||v.first_name||'') + ' ' + (v.driver_last_name||v.last_name||'')).trim() || '-';
                    var desc = v.description ? v.description.substring(0, 40) + (v.description.length > 40 ? '...' : '') : '-';
                    return '<tr>' +
                        '<td>#' + v.id + '</td>' +
                        '<td>' + driverName + '</td>' +
                        '<td style="text-transform:capitalize">' + ((v.violation_type||v.type||'').replace(/_/g, ' ')) + '</td>' +
                        '<td>' + desc + '</td>' +
                        '<td><span class="' + badgeClass(v.severity) + '">' + (v.severity||'-') + '</span></td>' +
                        '<td>' + (v.penalty || '-') + '</td>' +
                        '<td><span class="' + badgeClass(v.status) + '">' + (v.status||'pending') + '</span></td>' +
                        '<td>' + formatDate(v.created_at||v.date) + '</td>' +
                        '<td>' +
                            '<button class="btn btn-outline btn-sm" onclick="editViolation(' + v.id + ')">Update</button> ' +
                            '<button class="btn btn-danger btn-sm" onclick="deleteViolation(' + v.id + ')">Delete</button>' +
                        '</td></tr>';
                }).join('');
            }

            // Pagination
            var pag = document.getElementById('pagination');
            if (totalPages <= 1) { pag.innerHTML = ''; return; }
            var h = '';
            h += '<button ' + (currentPage <= 1 ? 'disabled' : 'onclick="currentPage--;renderPage()"') + '><i class="fa-solid fa-chevron-left"></i></button>';
            for (var i = 1; i <= totalPages; i++) {
                h += '<button class="' + (i === currentPage ? 'active-page' : '') + '" ' + (i === currentPage ? '' : 'onclick="currentPage=' + i + ';renderPage()"') + '>' + i + '</button>';
            }
            h += '<button ' + (currentPage >= totalPages ? 'disabled' : 'onclick="currentPage++;renderPage()"') + '><i class="fa-solid fa-chevron-right"></i></button>';
            pag.innerHTML = h;
        }

        // ── Edit Violation ──
        async function editViolation(id) {
            try {
                var v = await violations.get(id);
                document.getElementById('violationId').value = v.id;
                document.getElementById('violationStatus').value = v.status || 'pending';
                document.getElementById('violationSeverity').value = v.severity || 'minor';
                document.getElementById('violationPenalty').value = v.penalty || '';
                document.getElementById('violationModal').classList.add('active');
            } catch (err) {
                Swal.fire({ icon:'error', title:'Error', text: err.message, confirmButtonColor:'#10b981' });
            }
        }

        function closeModal() { document.getElementById('violationModal').classList.remove('active'); }

        document.getElementById('violationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var id = document.getElementById('violationId').value;
            try {
                await violations.update(id, {
                    status: document.getElementById('violationStatus').value,
                    severity: document.getElementById('violationSeverity').value,
                    penalty: document.getElementById('violationPenalty').value
                });
                Swal.fire({ icon:'success', title:'Violation Updated', text:'The violation has been updated.', confirmButtonColor:'#10b981' });
                closeModal();
                loadPage();
            } catch (err) {
                Swal.fire({ icon:'error', title:'Error', text: err.message, confirmButtonColor:'#10b981' });
            }
        });

        // ── Delete Violation ──
        async function deleteViolation(id) {
            var r = await Swal.fire({ title:'Delete Violation?', text:'This will permanently remove this violation record.', icon:'warning', showCancelButton:true, confirmButtonColor:'#ef4444', cancelButtonColor:'#9ca3af', confirmButtonText:'Yes, delete', cancelButtonText:'No' });
            if (!r.isConfirmed) return;
            try {
                await violations.update(id, { status: 'resolved' });
                Swal.fire({ icon:'success', title:'Deleted', text:'Violation has been removed.', confirmButtonColor:'#10b981' });
                loadPage();
            } catch (err) {
                Swal.fire({ icon:'error', title:'Error', text: err.message, confirmButtonColor:'#10b981' });
            }
        }

        // ── Load Page ──
        async function loadPage() {
            try {
                var statsData = await apiRequest('dashboard/barangay-stats.php');
                document.getElementById('brgyLabel').textContent = 'Brgy. ' + statsData.barangay_name;
                var ml = document.getElementById('mobileLabel'); if(ml) ml.textContent = 'Brgy. ' + statsData.barangay_name;
                allViolations = statsData.violations || statsData.recent_violations || [];
                filteredViolations = allViolations.slice();
                currentPage = 1;
                filterViolations();
            } catch(err) {
                Swal.fire({ icon:'error', title:'Error', text: err.message, confirmButtonColor:'#10b981' });
            }
        }

        document.getElementById('searchInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') { currentPage=1; filterViolations(); } });
        loadPage();
    </script>
</body>
</html>
