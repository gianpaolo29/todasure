<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODASURE - Complaints</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .swal2-popup{background:#0f172a!important;color:#f1f5f9!important}
        .swal2-title{color:#f1f5f9!important}
        .swal2-html-container{color:#94a3b8!important}
    </style>
</head>
<body>
    <button class="sidebar-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-icon"><i class="fa-solid fa-shield-halved"></i></div>
                <div>
                    <h2>TODASURE</h2>
                    <span id="brgyLabel">Barangay</span>
                </div>
            </div>
            <nav>
                <a href="dashboard.html"><i class="fa-solid fa-gauge icon"></i> Dashboard</a>
                <a href="drivers.html"><i class="fa-solid fa-id-card icon"></i> Drivers</a>
                <a href="tricycles.html"><i class="fa-solid fa-motorcycle icon"></i> Tricycles</a>
                <a href="complaints.html" class="active"><i class="fa-solid fa-triangle-exclamation icon"></i> Complaints</a>
                <a href="violations.html"><i class="fa-solid fa-gavel icon"></i> Violations</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-header">
                <span class="page-title" id="pageTitle">Complaints</span>
                <div class="header-actions">
                    <button class="header-icon-btn" id="notifBtn"><i class="fa-solid fa-bell"></i></button>
                    <div class="profile-dropdown">
                        <button class="profile-btn" id="profileBtn">
                            <div class="profile-avatar" id="profileInitial">B</div>
                            <div class="profile-info">
                                <div class="profile-name" id="profileName">Barangay</div>
                                <div class="profile-role">Barangay Official</div>
                            </div>
                            <i class="fa-solid fa-chevron-down chevron"></i>
                        </button>
                        <div class="dropdown-menu" id="profileMenu">
                            <a href="#"><i class="fa-solid fa-user"></i> Account Profile</a>
                            <div class="divider"></div>
                            <button class="danger" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="page-body">
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fa-solid fa-triangle-exclamation" style="color:var(--accent);margin-right:6px"></i> Complaints</h3>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr><th>ID</th><th>Driver</th><th>Type</th><th>Passenger</th><th>Description</th><th>Status</th><th>Actions</th></tr>
                            </thead>
                            <tbody id="complaintsTable">
                                <tr><td colspan="7" class="text-center text-muted" style="padding:30px">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Review Complaint Modal -->
    <div class="modal-overlay" id="complaintModal">
        <div class="modal">
            <div class="modal-header">
                <h2><i class="fa-solid fa-triangle-exclamation" style="color:var(--accent)"></i> Review Complaint</h2>
                <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div>
                <input type="hidden" id="editId">
                <div class="form-row" style="margin-bottom:14px">
                    <div class="form-group"><label>Complaint ID</label><div style="color:var(--text);font-weight:600;font-size:14px" id="detailId">-</div></div>
                    <div class="form-group"><label>Type</label><div style="color:var(--text);font-size:14px" id="detailType">-</div></div>
                </div>
                <div class="form-row" style="margin-bottom:14px">
                    <div class="form-group"><label>Driver</label><div style="color:var(--text);font-size:14px" id="detailDriver">-</div></div>
                    <div class="form-group"><label>Passenger</label><div style="color:var(--text);font-size:14px" id="detailPassenger">-</div></div>
                </div>
                <div class="form-group"><label>Description</label><p id="detailDescription" style="color:var(--text-secondary);line-height:1.5;font-size:13px;background:rgba(255,255,255,.03);padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,.06)">-</p></div>
                <div class="form-group"><label>Status</label>
                    <select id="complaintStatus" class="form-control">
                        <option value="pending">Pending</option>
                        <option value="investigating">Investigating</option>
                        <option value="resolved">Resolved</option>
                        <option value="dismissed">Dismissed</option>
                    </select>
                </div>
                <div class="form-group"><label>Admin Notes</label><textarea id="adminNotes" class="form-control" rows="3" placeholder="Add notes about this complaint..."></textarea></div>
                <div style="display:flex;gap:10px;margin-top:8px">
                    <button type="button" class="btn btn-outline" style="flex:1;justify-content:center" onclick="closeModal()">Cancel</button>
                    <button type="button" class="btn btn-primary" style="flex:1;justify-content:center" onclick="handleComplaintUpdate()"><i class="fa-solid fa-check"></i> Update</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/guard.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        // ── Common UI ──
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('show');
            this.classList.add('hide');
        });
        document.getElementById('sidebarOverlay').addEventListener('click', function() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');
            document.getElementById('sidebarToggle').classList.remove('hide');
        });
        document.getElementById('profileBtn').addEventListener('click', function(e) { e.stopPropagation(); document.getElementById('profileMenu').classList.toggle('show'); });
        document.addEventListener('click', function() { document.getElementById('profileMenu').classList.remove('show'); });

        (async function() {
            try {
                var s = await auth.session();
                if (s.role !== 'barangay' && s.role !== 'admin') { window.location.replace('/TodaShare/login.html'); return; }
                var n = ((s.first_name||'') + ' ' + (s.last_name||'')).trim();
                document.getElementById('profileName').textContent = n || 'Barangay';
                document.getElementById('profileInitial').textContent = (s.first_name||'B')[0].toUpperCase();
            } catch(e) { window.location.replace('/TodaShare/login.html'); }
        })();

        window.showAlert = function(msg, type) {
            Swal.mixin({ toast:true, position:'top-end', showConfirmButton:false, timer:3000, timerProgressBar:true })
                .fire({ icon: type==='error'?'error':'success', title: msg });
        };

        async function handleLogout() {
            var r = await Swal.fire({ title:'Logout?', icon:'question', showCancelButton:true, confirmButtonColor:'#00e6a0', confirmButtonText:'Yes' });
            if (r.isConfirmed) { await auth.logout(); localStorage.removeItem('user'); window.location.replace('/TodaShare/login.html'); }
        }

        document.getElementById('notifBtn').addEventListener('click', function() {
            Swal.fire({ title:'Notifications', html:'<p>Complaints management page</p>', icon:'info', confirmButtonColor:'#00e6a0' });
        });

        // ── Data ──
        var statsData = null;

        function closeModal() {
            document.getElementById('complaintModal').classList.remove('active');
        }

        async function openReviewModal(id) {
            try {
                var c = await complaints.get(id);
                document.getElementById('editId').value = id;
                document.getElementById('detailId').textContent = '#' + c.id;
                document.getElementById('detailType').textContent = c.complaint_type || c.type || '-';
                document.getElementById('detailDriver').textContent = ((c.driver_first_name||c.first_name||'') + ' ' + (c.driver_last_name||c.last_name||'')).trim() || '-';
                document.getElementById('detailPassenger').textContent = ((c.passenger_first_name||'') + ' ' + (c.passenger_last_name||'')).trim() || c.passenger_name || '-';
                document.getElementById('detailDescription').textContent = c.description || '-';
                document.getElementById('complaintStatus').value = c.status || 'pending';
                document.getElementById('adminNotes').value = c.admin_notes || c.notes || '';
                document.getElementById('complaintModal').classList.add('active');
            } catch(err) { showAlert(err.message, 'error'); }
        }

        async function handleComplaintUpdate() {
            var id = document.getElementById('editId').value;
            try {
                await complaints.update(id, {
                    status: document.getElementById('complaintStatus').value,
                    admin_notes: document.getElementById('adminNotes').value
                });
                showAlert('Complaint updated successfully');
                closeModal();
                loadPage();
            } catch(err) { showAlert(err.message, 'error'); }
        }

        function renderComplaints(list) {
            var tb = document.getElementById('complaintsTable');
            if (!list || !list.length) {
                tb.innerHTML = '<tr><td colspan="7" class="text-center text-muted" style="padding:30px">No complaints found</td></tr>';
                return;
            }
            tb.innerHTML = list.map(function(c) {
                var driverName = ((c.driver_first_name||c.first_name||'') + ' ' + (c.driver_last_name||c.last_name||'')).trim() || '-';
                var passengerName = ((c.passenger_first_name||'') + ' ' + (c.passenger_last_name||'')).trim() || c.passenger_name || '-';
                var desc = (c.description||'-');
                if (desc.length > 40) desc = desc.substring(0,40) + '...';
                return '<tr>' +
                    '<td>#' + c.id + '</td>' +
                    '<td>' + driverName + '</td>' +
                    '<td>' + (c.complaint_type||c.type||'-') + '</td>' +
                    '<td>' + passengerName + '</td>' +
                    '<td>' + desc + '</td>' +
                    '<td><span class="badge badge-' + (c.status||'pending') + '">' + (c.status||'pending') + '</span></td>' +
                    '<td><button onclick="openReviewModal(' + c.id + ')" class="btn btn-sm" title="Review"><i class="fa-solid fa-eye"></i></button></td>' +
                    '</tr>';
            }).join('');
        }

        async function loadPage() {
            try {
                statsData = await apiRequest('dashboard/barangay-stats.php');
                document.getElementById('brgyLabel').textContent = 'Brgy. ' + statsData.barangay_name;
                renderComplaints(statsData.recent_complaints);
            } catch(err) { showAlert(err.message, 'error'); }
        }

        // ── Init ──
        loadPage();
    </script>
</body>
</html>
