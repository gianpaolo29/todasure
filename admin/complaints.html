<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODASURE - Complaints</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>.swal2-popup{background:#0f172a!important;color:#f1f5f9!important}.swal2-title{color:#f1f5f9!important}.swal2-html-container{color:#94a3b8!important}</style>
</head>
<body>
    <button class="sidebar-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-icon"><i class="fa-solid fa-shield-halved"></i></div>
                <div>
                    <h2>TODASURE</h2>
                    <span>Admin Panel</span>
                </div>
            </div>
            <nav>
                <a href="dashboard.html"><i class="fa-solid fa-gauge icon"></i> Dashboard</a>
                <a href="drivers.html"><i class="fa-solid fa-id-card icon"></i> Drivers</a>
                <a href="tricycles.html"><i class="fa-solid fa-motorcycle icon"></i> Tricycles</a>
                <a href="toda.html"><i class="fa-solid fa-building icon"></i> TODA</a>
                <a href="trips.html"><i class="fa-solid fa-route icon"></i> Trips</a>
                <a href="fares.html"><i class="fa-solid fa-peso-sign icon"></i> Fare Rates</a>
                <a href="complaints.html" class="active"><i class="fa-solid fa-triangle-exclamation icon"></i> Complaints</a>
                <a href="violations.html"><i class="fa-solid fa-gavel icon"></i> Violations</a>
                <a href="users.html"><i class="fa-solid fa-users icon"></i> Passengers</a>
                <a href="barangays.html"><i class="fa-solid fa-map-location-dot icon"></i> Barangays</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-header">
                <span class="page-title">Complaints</span>
                <div class="header-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search..." id="globalSearch">
                </div>
                <div class="header-actions">
                    <button class="header-icon-btn" id="notifBtn" title="Notifications">
                        <i class="fa-solid fa-bell"></i>
                    </button>
                    <div class="profile-dropdown">
                        <button class="profile-btn" id="profileBtn">
                            <div class="profile-avatar" id="profileInitial">A</div>
                            <div class="profile-info">
                                <div class="profile-name" id="profileName">Admin</div>
                                <div class="profile-role">Administrator</div>
                            </div>
                            <i class="fa-solid fa-chevron-down chevron"></i>
                        </button>
                        <div class="dropdown-menu" id="profileMenu">
                            <a href="#"><i class="fa-solid fa-user"></i> Account Profile</a>
                            <div class="divider"></div>
                            <button class="danger" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="page-body">
                <div class="card" style="padding:16px;">
                    <div class="flex gap-2">
                        <select id="filterStatus" class="form-control" style="max-width:200px;">
                            <option value="">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="investigating">Investigating</option>
                            <option value="resolved">Resolved</option>
                            <option value="dismissed">Dismissed</option>
                        </select>
                        <button class="btn btn-outline" onclick="loadComplaints()">Filter</button>
                    </div>
                </div>

                <div class="card">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Driver</th>
                                    <th>Plate</th>
                                    <th>Passenger</th>
                                    <th>Type</th>
                                    <th>Description</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="complaintsTable">
                                <tr><td colspan="9" class="text-center text-muted">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Review Modal -->
    <div class="modal-overlay" id="reviewModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Review Complaint</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="reviewForm">
                <input type="hidden" id="complaintId">
                <div class="form-group">
                    <label>Status</label>
                    <select id="complaintStatus" class="form-control">
                        <option value="pending">Pending</option>
                        <option value="investigating">Investigating</option>
                        <option value="resolved">Resolved</option>
                        <option value="dismissed">Dismissed</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Admin Notes</label>
                    <textarea id="adminNotes" class="form-control"></textarea>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="createViolation"> Create violation record</label>
                </div>
                <div class="flex gap-2" style="justify-content:flex-end; margin-top:16px;">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Update</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/guard.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        // Sidebar toggle
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('show');
            this.classList.add('hide');
        });
        document.getElementById('sidebarOverlay').addEventListener('click', function() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');
            document.getElementById('sidebarToggle').classList.remove('hide');
});
        // Close sidebar when nav link clicked (mobile)
        document.querySelectorAll('.sidebar nav a').forEach(function(link) {
            link.addEventListener('click', function() {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebarOverlay').classList.remove('show');
            });
        });

        // Profile dropdown
        document.getElementById('profileBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('profileMenu').classList.toggle('show');
        });
        document.addEventListener('click', function() {
            document.getElementById('profileMenu').classList.remove('show');
        });

        // Load profile
        (async function() {
            try {
                var s = await auth.session();
                var n = ((s.first_name||'') + ' ' + (s.last_name||'')).trim();
                document.getElementById('profileName').textContent = n || 'Admin';
                document.getElementById('profileInitial').textContent = (s.first_name||'A')[0].toUpperCase();
            } catch(e) {}
        })();

        // SweetAlert showAlert
        window.showAlert = function(msg, type) {
            Swal.mixin({ toast:true, position:'top-end', showConfirmButton:false, timer:3000, timerProgressBar:true })
                .fire({ icon: type==='error'?'error':'success', title: msg });
        };

        // Logout
        async function handleLogout() {
            var r = await Swal.fire({ title:'Logout?', text:'Are you sure?', icon:'question', showCancelButton:true, confirmButtonColor:'#00e6a0', cancelButtonColor:'#9ca3af', confirmButtonText:'Yes, logout' });
            if (r.isConfirmed) { await auth.logout(); localStorage.removeItem('user'); window.location.replace('/TodaShare/login.html'); }
        }

        async function loadComplaints() {
            const params = {};
            const status = document.getElementById('filterStatus').value;
            if (status) params.status = status;

            try {
                const list = await complaints.list(params);
                const tbody = document.getElementById('complaintsTable');
                if (list.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted">No complaints</td></tr>';
                    return;
                }
                tbody.innerHTML = list.map(c => `
                    <tr>
                        <td>#${c.id}</td>
                        <td>${c.first_name} ${c.last_name}</td>
                        <td>${c.plate_number}</td>
                        <td>${c.passenger_name || 'Anonymous'}</td>
                        <td>${c.complaint_type.replace(/_/g, ' ')}</td>
                        <td>${c.description.substring(0, 50)}${c.description.length > 50 ? '...' : ''}</td>
                        <td><span class="${badgeClass(c.status)}">${c.status}</span></td>
                        <td>${formatDate(c.created_at)}</td>
                        <td><button class="btn btn-outline btn-sm" onclick="reviewComplaint(${c.id})">Review</button></td>
                    </tr>
                `).join('');
            } catch (err) { showAlert(err.message, 'error'); }
        }

        async function reviewComplaint(id) {
            const c = await complaints.get(id);
            document.getElementById('complaintId').value = c.id;
            document.getElementById('complaintStatus').value = c.status;
            document.getElementById('adminNotes').value = c.admin_notes || '';
            document.getElementById('createViolation').checked = false;
            document.getElementById('reviewModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('reviewModal').classList.remove('active');
        }

        document.getElementById('reviewForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('complaintId').value;
            const data = {
                status: document.getElementById('complaintStatus').value,
                admin_notes: document.getElementById('adminNotes').value,
                create_violation: document.getElementById('createViolation').checked
            };
            try {
                await complaints.update(id, data);
                showAlert('Complaint updated');
                closeModal();
                loadComplaints();
            } catch (err) { showAlert(err.message, 'error'); }
        });

        loadComplaints();
    </script>
</body>
</html>
