<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODASURE - Barangay Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>.swal2-popup{background:var(--bg-card-solid)!important;color:var(--text)!important}.swal2-title{color:var(--text)!important}.swal2-html-container{color:var(--text-secondary)!important}</style>
</head>
<body>
    <button class="sidebar-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-icon"><img src="../todasure-logo.jpg" style="width:100%;height:100%;object-fit:cover;border-radius:inherit"></div>
                <div>
                    <h2>TODASURE</h2>
                    <span>Admin Panel</span>
                </div>
            </div>
            <nav>
                <a href="dashboard.html"><i class="fa-solid fa-gauge icon"></i> Dashboard</a>
                <a href="drivers.html"><i class="fa-solid fa-id-card icon"></i> Drivers</a>
                <a href="tricycles.html"><i class="fa-solid fa-motorcycle icon"></i> Tricycles</a>
                <a href="trips.html"><i class="fa-solid fa-route icon"></i> Trips</a>
                <a href="fares.html"><i class="fa-solid fa-peso-sign icon"></i> Fare Rates</a>
                <a href="complaints.html"><i class="fa-solid fa-triangle-exclamation icon"></i> Complaints</a>
                <a href="violations.html"><i class="fa-solid fa-gavel icon"></i> Violations</a>
                <a href="users.html"><i class="fa-solid fa-users icon"></i> Passengers</a>
                <a href="officials.html"><i class="fa-solid fa-user-tie icon"></i> Brgy Officials</a>
                <a href="barangays.html" class="active"><i class="fa-solid fa-map-location-dot icon"></i> Barangays</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-header">
                <span class="page-title">Barangay Management</span>
                <div class="header-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search..." id="globalSearch">
                </div>
                <div class="header-actions">
                    <div style="position:relative">
                        <button class="header-icon-btn" id="notifBtn" title="Notifications">
                            <i class="fa-solid fa-bell"></i>
                            <span class="notif-dot" id="notifDot" style="display:none"></span>
                        </button>
                        <div class="dropdown-menu" id="notifDropdown" style="min-width:320px;max-width:380px;padding:0">
                            <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border)">
                                <span style="font-size:14px;font-weight:700;color:var(--text)">Notifications</span>
                                <button onclick="markAllNotifRead()" style="background:none;border:none;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">Mark all read</button>
                            </div>
                            <div id="notifList" style="max-height:340px;overflow-y:auto">
                                <div style="padding:30px 16px;text-align:center;color:var(--text-muted);font-size:13px">No notifications</div>
                            </div>
                        </div>
                    </div>
                    <div class="profile-dropdown">
                        <button class="profile-btn" id="profileBtn">
                            <div class="profile-avatar" id="profileInitial">A</div>
                            <div class="profile-info">
                                <div class="profile-name" id="profileName">Admin</div>
                                <div class="profile-role">Administrator</div>
                            </div>
                            <i class="fa-solid fa-chevron-down chevron"></i>
                        </button>
                        <div class="dropdown-menu" id="profileMenu">
                            <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
                                <div style="font-size:14px;font-weight:600;color:var(--text)" id="dropdownName">Admin</div>
                                <div style="font-size:11px;color:var(--text-muted)" id="dropdownEmail">admin@todasure.com</div>
                            </div>
                            <a href="#" onclick="openAdminProfile()"><i class="fa-solid fa-user"></i> Account Profile</a>
                            <button onclick="themeToggle()" style="width:100%;text-align:left;background:none;border:none;cursor:pointer;font-family:inherit" id="themeMenuItem"><i class="fa-solid fa-moon"></i> Dark Mode</button>
                            <div class="divider"></div>
                            <button class="danger" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="page-body">
                <div class="card" style="padding:16px;">
                    <div class="flex gap-2">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search barangay..." style="max-width:250px;">
                        <button class="btn btn-outline" onclick="loadBarangays()">Search</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3><i class="fa-solid fa-map-location-dot" style="color:var(--accent);margin-right:8px;"></i>Nasugbu Barangays <span id="brgyCount" style="font-size:12px;color:var(--text-muted);font-weight:400"></span></h3>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Municipality</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="barangayTable">
                                <tr><td colspan="4" class="text-center text-muted">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/guard.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        // Sidebar toggle
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('show');
            this.classList.add('hide');
        });
        document.getElementById('sidebarOverlay').addEventListener('click', function() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');
            document.getElementById('sidebarToggle').classList.remove('hide');
        });
        // Close sidebar when nav link clicked (mobile)
        document.querySelectorAll('.sidebar nav a').forEach(function(link) {
            link.addEventListener('click', function() {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebarOverlay').classList.remove('show');
            });
        });

        // Profile dropdown
        document.getElementById('profileBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('profileMenu').classList.toggle('show');
        });
        document.addEventListener('click', function() {
            document.getElementById('profileMenu').classList.remove('show');
        });

        // Load profile
        (async function() {
            try {
                var s = await auth.session();
                var n = ((s.first_name||'') + ' ' + (s.last_name||'')).trim();
                document.getElementById('profileName').textContent = n || 'Admin';
                document.getElementById('profileInitial').textContent = (s.first_name||'A')[0].toUpperCase();
                var dn = document.getElementById('dropdownName'); if(dn) dn.textContent = n || 'Admin';
                var de = document.getElementById('dropdownEmail'); if(de) de.textContent = s.email || '';
            } catch(e) {}
        })();

        // Theme menu item update
        function updateThemeMenuItem() {
            var el = document.getElementById('themeMenuItem');
            if (!el) return;
            var theme = document.documentElement.getAttribute('data-theme');
            el.innerHTML = theme === 'dark' ? '<i class="fa-solid fa-sun"></i> Light Mode' : '<i class="fa-solid fa-moon"></i> Dark Mode';
        }
        updateThemeMenuItem();
        var _adminThemeToggle = window.themeToggle;
        window.themeToggle = function() { _adminThemeToggle(); updateThemeMenuItem(); };

        // SweetAlert showAlert
        window.showAlert = function(msg, type) {
            Swal.mixin({ toast:true, position:'top-end', showConfirmButton:false, timer:3000, timerProgressBar:true })
                .fire({ icon: type==='error'?'error':'success', title: msg });
        };

        // Admin Profile
        async function openAdminProfile() {
            document.getElementById('profileMenu').classList.remove('show');
            try {
                const s = await auth.session();
                const { value: formData } = await Swal.fire({
                    title: 'Account Profile',
                    html: `
                        <div style="text-align:left;font-size:13px">
                            <div style="text-align:center;margin-bottom:16px">
                                <div style="width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#00e6a0,#059669);display:inline-flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff">${(s.first_name||'A')[0].toUpperCase()}</div>
                            </div>
                            <label style="display:block;margin-bottom:4px;font-weight:600;color:var(--text-secondary)">First Name</label>
                            <input id="swal-fn" value="${s.first_name||''}" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:10px;background:var(--bg-input);color:var(--text);font-family:inherit;outline:none">
                            <label style="display:block;margin-bottom:4px;font-weight:600;color:var(--text-secondary)">Last Name</label>
                            <input id="swal-ln" value="${s.last_name||''}" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:10px;background:var(--bg-input);color:var(--text);font-family:inherit;outline:none">
                            <label style="display:block;margin-bottom:4px;font-weight:600;color:var(--text-secondary)">Email</label>
                            <input value="${s.email||''}" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:10px;background:var(--bg-hover);color:var(--text-muted);font-family:inherit;outline:none" readonly>
                            <label style="display:block;margin-bottom:4px;font-weight:600;color:var(--text-secondary)">Phone</label>
                            <input id="swal-ph" value="${s.phone||''}" placeholder="09xxxxxxxxx" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg-input);color:var(--text);font-family:inherit;outline:none">
                        </div>
                    `,
                    showCancelButton: true,
                    confirmButtonText: 'Save Changes',
                    confirmButtonColor: '#00e6a0',
                    cancelButtonText: 'Close',
                    cancelButtonColor: '#9ca3af',
                    preConfirm: () => ({
                        first_name: document.getElementById('swal-fn').value.trim(),
                        last_name: document.getElementById('swal-ln').value.trim(),
                        phone: document.getElementById('swal-ph').value.trim()
                    })
                });
                if (formData) {
                    if (!formData.first_name) return Swal.fire({icon:'warning',title:'Required',text:'First name is required.',confirmButtonColor:'#00e6a0'});
                    await apiRequest('../api/auth/update-profile.php','POST',formData);
                    Swal.fire({icon:'success',title:'Profile Updated',confirmButtonColor:'#00e6a0'});
                    var n = (formData.first_name + ' ' + formData.last_name).trim();
                    document.getElementById('profileName').textContent = n;
                    document.getElementById('profileInitial').textContent = formData.first_name[0].toUpperCase();
                    var dn = document.getElementById('dropdownName'); if(dn) dn.textContent = n;
                }
            } catch(err) {
                Swal.fire({icon:'error',title:'Error',text:err.message||'Failed to load profile.',confirmButtonColor:'#00e6a0'});
            }
        }


        // Notifications Dropdown
        function timeAgo(dateStr) {
            var d = new Date(dateStr); var now = new Date(); var s = Math.floor((now-d)/1000);
            if (s < 60) return 'Just now';
            if (s < 3600) return Math.floor(s/60) + 'm ago';
            if (s < 86400) return Math.floor(s/3600) + 'h ago';
            return Math.floor(s/86400) + 'd ago';
        }
        function getNotifIcon(type) {
            if (type === 'complaint') return '<i class="fa-solid fa-triangle-exclamation" style="color:#f59e0b"></i>';
            if (type === 'violation') return '<i class="fa-solid fa-gavel" style="color:#ef4444"></i>';
            if (type === 'booking') return '<i class="fa-solid fa-motorcycle" style="color:#0ea5e9"></i>';
            return '<i class="fa-solid fa-bell" style="color:var(--accent)"></i>';
        }
        async function loadNotifications() {
            try {
                var data = await notifications.list();
                var dot = document.getElementById('notifDot');
                if (dot) dot.style.display = data.unread_count > 0 ? 'block' : 'none';
                var container = document.getElementById('notifList');
                var list = data.notifications || [];
                if (list.length === 0) {
                    container.innerHTML = '<div style="padding:30px 16px;text-align:center;color:var(--text-muted);font-size:13px"><i class="fa-solid fa-bell-slash" style="font-size:20px;display:block;margin-bottom:8px;opacity:.3"></i>No notifications</div>';
                    return;
                }
                container.innerHTML = list.slice(0,15).map(function(n) {
                    var bg = n.is_read == 0 ? 'background:rgba(0,230,160,.03);' : '';
                    return '<div style="display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);' + bg + 'transition:background .15s" onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background='' + (n.is_read == 0 ? 'rgba(0,230,160,.03)' : 'none') + ''">' +
                        '<div style="width:32px;height:32px;border-radius:50%;background:var(--bg-input);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px">' + getNotifIcon(n.type) + '</div>' +
                        '<div style="flex:1;min-width:0">' +
                            '<div style="font-size:13px;font-weight:' + (n.is_read == 0 ? '600' : '400') + ';color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + n.title + '</div>' +
                            '<div style="font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (n.message || '') + '</div>' +
                            '<div style="font-size:11px;color:var(--text-muted);margin-top:2px">' + timeAgo(n.created_at) + '</div>' +
                        '</div>' +
                        (n.is_read == 0 ? '<div style="width:8px;height:8px;border-radius:50%;background:#ef4444;flex-shrink:0;margin-top:6px"></div>' : '') +
                    '</div>';
                }).join('');
            } catch(e) {}
        }
        async function markAllNotifRead() {
            try {
                await notifications.markAllRead();
                loadNotifications();
            } catch(e) {}
        }
        document.getElementById('notifBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('profileMenu').classList.remove('show');
            document.getElementById('notifDropdown').classList.toggle('show');
            loadNotifications();
        });
        document.addEventListener('click', function(e) {
            if (!e.target.closest('#notifDropdown') && !e.target.closest('#notifBtn')) {
                document.getElementById('notifDropdown').classList.remove('show');
            }
        });
        loadNotifications();

        // Logout
        async function handleLogout() {
            var r = await Swal.fire({ title:'Logout?', text:'Are you sure?', icon:'question', showCancelButton:true, confirmButtonColor:'#00e6a0', cancelButtonColor:'#9ca3af', confirmButtonText:'Yes, logout' });
            if (r.isConfirmed) { await auth.logout(); localStorage.removeItem('user'); window.location.replace('/TodaShare/login.html'); }
        }

        async function loadBarangays() {
            try {
                let list = await apiRequest('barangays/index.php');
                const search = document.getElementById('searchInput').value.trim().toLowerCase();
                if (search) {
                    list = list.filter(b => b.name.toLowerCase().includes(search));
                }
                document.getElementById('brgyCount').textContent = `(${list.length} barangays)`;
                const tbody = document.getElementById('barangayTable');
                if (list.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No barangays found</td></tr>';
                    return;
                }
                tbody.innerHTML = list.map(b => {
                    const st = b.status || 'active';
                    return `
                    <tr>
                        <td>#${b.id}</td>
                        <td>${b.name}</td>
                        <td>${b.municipality || 'Nasugbu'}</td>
                        <td><span class="${badgeClass(st)}">${st}</span></td>
                        <td>${st === 'active'
                            ? `<button class="btn btn-danger btn-sm" onclick="toggleStatus(${b.id},'inactive')">Deactivate</button>`
                            : `<button class="btn btn-success btn-sm" onclick="toggleStatus(${b.id},'active')">Activate</button>`
                        }</td>
                    </tr>`;
                }).join('');
            } catch (err) {
                Swal.fire({ icon:'error', title:'Error', text: err.message, confirmButtonColor:'#00e6a0' });
            }
        }

        async function toggleStatus(id, newStatus) {
            const action = newStatus === 'active' ? 'Activate' : 'Deactivate';
            const r = await Swal.fire({ title: `${action} Barangay?`, icon: 'question', showCancelButton: true, confirmButtonColor: newStatus === 'active' ? '#00e6a0' : '#ef4444', cancelButtonColor: '#9ca3af', confirmButtonText: `Yes, ${action.toLowerCase()}`, cancelButtonText: 'No' });
            if (!r.isConfirmed) return;
            try {
                await apiRequest('barangays/index.php?id=' + id, 'PUT', { status: newStatus });
                Swal.fire({ icon: 'success', title: `${action}d`, text: `Barangay has been ${action.toLowerCase()}d.`, confirmButtonColor: '#00e6a0' });
                loadBarangays();
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'Error', text: err.message, confirmButtonColor: '#00e6a0' });
            }
        }

        document.getElementById('searchInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') loadBarangays(); });
        loadBarangays();
    </script>
</body>
</html>
