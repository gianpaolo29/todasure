<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODASURE - User Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>.swal2-popup{background:#0f172a!important;color:#f1f5f9!important}.swal2-title{color:#f1f5f9!important}.swal2-html-container{color:#94a3b8!important}
.badge-admin{background:rgba(168,85,247,0.15);color:#a855f7;border:1px solid rgba(168,85,247,0.3)}
.badge-driver{background:rgba(59,130,246,0.15);color:#3b82f6;border:1px solid rgba(59,130,246,0.3)}
.badge-passenger{background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3)}
.badge-barangay{background:rgba(249,115,22,0.15);color:#f97316;border:1px solid rgba(249,115,22,0.3)}
</style>
</head>
<body>
    <button class="sidebar-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-icon"><i class="fa-solid fa-shield-halved"></i></div>
                <div>
                    <h2>TODASURE</h2>
                    <span>Admin Panel</span>
                </div>
            </div>
            <nav>
                <a href="dashboard.html"><i class="fa-solid fa-gauge icon"></i> Dashboard</a>
                <a href="drivers.html"><i class="fa-solid fa-id-card icon"></i> Drivers</a>
                <a href="tricycles.html"><i class="fa-solid fa-motorcycle icon"></i> Tricycles</a>
                <a href="toda.html"><i class="fa-solid fa-building icon"></i> TODA</a>
                <a href="trips.html"><i class="fa-solid fa-route icon"></i> Trips</a>
                <a href="fares.html"><i class="fa-solid fa-peso-sign icon"></i> Fare Rates</a>
                <a href="complaints.html"><i class="fa-solid fa-triangle-exclamation icon"></i> Complaints</a>
                <a href="violations.html"><i class="fa-solid fa-gavel icon"></i> Violations</a>
                <a href="users.html" class="active"><i class="fa-solid fa-users icon"></i> Passengers</a>
                <a href="barangays.html"><i class="fa-solid fa-map-location-dot icon"></i> Barangays</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-header">
                <span class="page-title">Passenger Management</span>
                <div class="header-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search..." id="globalSearch">
                </div>
                <div class="header-actions">
                    <button class="header-icon-btn" id="notifBtn" title="Notifications">
                        <i class="fa-solid fa-bell"></i>
                    </button>
                    <div class="profile-dropdown">
                        <button class="profile-btn" id="profileBtn">
                            <div class="profile-avatar" id="profileInitial">A</div>
                            <div class="profile-info">
                                <div class="profile-name" id="profileName">Admin</div>
                                <div class="profile-role">Administrator</div>
                            </div>
                            <i class="fa-solid fa-chevron-down chevron"></i>
                        </button>
                        <div class="dropdown-menu" id="profileMenu">
                            <a href="#"><i class="fa-solid fa-user"></i> Account Profile</a>
                            <div class="divider"></div>
                            <button class="danger" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="page-body">
                <!-- Filters -->
                <div class="card" style="padding:16px;">
                    <div class="flex gap-2">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search by name or email..." style="max-width:300px;">
                        <select id="filterStatus" class="form-control" style="max-width:150px;">
                            <option value="">All Status</option>
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                        <button class="btn btn-outline" onclick="loadUsers()">Filter</button>
                    </div>
                </div>

                <!-- Users Table -->
                <div class="card">
                    <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
                        <h3><i class="fa-solid fa-users" style="color:var(--accent);margin-right:8px;"></i>Passengers</h3>
                        <button class="btn btn-primary btn-sm" onclick="openAddModal()"><i class="fa-solid fa-plus" style="margin-right:4px;"></i> Add Passenger</button>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="usersTable">
                                <tr><td colspan="6" class="text-center text-muted">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="userModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Add User</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" id="firstName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name *</label>
                        <input type="text" id="lastName" class="form-control" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" id="phone" class="form-control">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <input type="hidden" id="role" value="passenger">
                        <input type="hidden" id="barangayId" value="">
                    </div>
                </div>
                <div id="passwordFields">
                    <div class="form-group">
                        <label id="passwordLabel">Password *</label>
                        <input type="password" id="password" class="form-control">
                    </div>
                </div>
                <div class="flex gap-2" style="justify-content:flex-end; margin-top:16px;">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Save User</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/guard.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        // Sidebar toggle
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('show');
            this.classList.add('hide');
        });
        document.getElementById('sidebarOverlay').addEventListener('click', function() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');
            document.getElementById('sidebarToggle').classList.remove('hide');
        });
        // Close sidebar when nav link clicked (mobile)
        document.querySelectorAll('.sidebar nav a').forEach(function(link) {
            link.addEventListener('click', function() {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebarOverlay').classList.remove('show');
            });
        });

        // Profile dropdown
        document.getElementById('profileBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('profileMenu').classList.toggle('show');
        });
        document.addEventListener('click', function() {
            document.getElementById('profileMenu').classList.remove('show');
        });

        // Load profile
        (async function() {
            try {
                var s = await auth.session();
                var n = ((s.first_name||'') + ' ' + (s.last_name||'')).trim();
                document.getElementById('profileName').textContent = n || 'Admin';
                document.getElementById('profileInitial').textContent = (s.first_name||'A')[0].toUpperCase();
            } catch(e) {}
        })();

        // SweetAlert showAlert
        window.showAlert = function(msg, type) {
            Swal.mixin({ toast:true, position:'top-end', showConfirmButton:false, timer:3000, timerProgressBar:true })
                .fire({ icon: type==='error'?'error':'success', title: msg });
        };

        // Logout
        async function handleLogout() {
            var r = await Swal.fire({ title:'Logout?', text:'Are you sure?', icon:'question', showCancelButton:true, confirmButtonColor:'#00e6a0', cancelButtonColor:'#9ca3af', confirmButtonText:'Yes, logout' });
            if (r.isConfirmed) { await auth.logout(); localStorage.removeItem('user'); window.location.replace('/TodaShare/login.html'); }
        }

        let barangayList = [];

        async function loadBarangays() {
            try {
                barangayList = await apiRequest('barangays/index.php');
                const sel = document.getElementById('barangayId');
                sel.innerHTML = '<option value="">Select Barangay</option>';
                barangayList.forEach(b => {
                    const opt = document.createElement('option');
                    opt.value = b.id;
                    opt.textContent = b.name;
                    sel.appendChild(opt);
                });
            } catch (err) {
                console.error('Failed to load barangays:', err);
            }
        }

        function toggleBarangayField() {
            const role = document.getElementById('role').value;
            const group = document.getElementById('barangayGroup');
            group.style.display = role === 'barangay' ? '' : 'none';
            document.getElementById('barangayId').required = role === 'barangay';
        }

        function roleBadge(role) {
            return `<span class="badge badge-${role}">${role.charAt(0).toUpperCase() + role.slice(1)}</span>`;
        }

        async function loadUsers() {
            const params = { role: 'passenger' };
            const search = document.getElementById('searchInput').value;
            const status = document.getElementById('filterStatus').value;
            if (search) params.search = search;
            if (status) params.status = status;

            try {
                const qs = Object.keys(params).length ? '?' + new URLSearchParams(params) : '';
                const list = await apiRequest('users/index.php' + qs);

                const tbody = document.getElementById('usersTable');
                if (!list || list.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No users found</td></tr>';
                    return;
                }
                tbody.innerHTML = list.map(u => `
                    <tr>
                        <td>#${u.id}</td>
                        <td>${u.first_name || ''} ${u.last_name || ''}</td>
                        <td>${u.email || '-'}</td>
                        <td>${u.phone || '-'}</td>
                        <td><span class="${badgeClass(u.status || 'active')}">${u.status || 'active'}</span></td>
                        <td>
                            <button class="btn btn-outline btn-sm" onclick="editUser(${u.id})">Edit</button>
                            ${(u.status || 'active') === 'active' ?
                                `<button class="btn btn-danger btn-sm" onclick="deactivateUser(${u.id})">Deactivate</button>` :
                                `<button class="btn btn-success btn-sm" onclick="activateUser(${u.id})">Activate</button>`
                            }
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                showAlert(err.message, 'error');
            }
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add User';
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = '';
            document.getElementById('passwordFields').style.display = 'block';
            document.getElementById('password').required = true;
            document.getElementById('passwordLabel').textContent = 'Password *';
            document.getElementById('barangayGroup').style.display = 'none';
            document.getElementById('barangayId').required = false;
            document.getElementById('userModal').classList.add('active');
        }

        async function editUser(id) {
            try {
                const u = await apiRequest('users/index.php?id=' + id);
                document.getElementById('modalTitle').textContent = 'Edit User';
                document.getElementById('userId').value = u.id;
                document.getElementById('firstName').value = u.first_name || '';
                document.getElementById('lastName').value = u.last_name || '';
                document.getElementById('email').value = u.email || '';
                document.getElementById('phone').value = u.phone || '';
                document.getElementById('role').value = u.role || '';
                toggleBarangayField();
                if (u.role === 'barangay') {
                    document.getElementById('barangayId').value = u.barangay_id || '';
                }
                // Password optional on edit
                document.getElementById('passwordFields').style.display = 'block';
                document.getElementById('password').required = false;
                document.getElementById('password').value = '';
                document.getElementById('passwordLabel').textContent = 'Password (leave blank to keep current)';
                document.getElementById('userModal').classList.add('active');
            } catch (err) {
                showAlert(err.message, 'error');
            }
        }

        function closeModal() {
            document.getElementById('userModal').classList.remove('active');
        }

        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('userId').value;
            const data = {
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                role: document.getElementById('role').value
            };

            if (data.role === 'barangay') {
                data.barangay_id = document.getElementById('barangayId').value;
            }

            const password = document.getElementById('password').value;
            if (password) {
                data.password = password;
            }

            try {
                if (id) {
                    await apiRequest('users/index.php?id=' + id, 'PUT', data);
                    showAlert('User updated successfully');
                } else {
                    await apiRequest('users/index.php', 'POST', data);
                    showAlert('User created successfully');
                }
                closeModal();
                loadUsers();
            } catch (err) {
                showAlert(err.message, 'error');
            }
        });

        async function deactivateUser(id) {
            const r = await Swal.fire({ title: 'Deactivate User?', text: 'This user will be set to inactive.', icon: 'warning', showCancelButton: true, confirmButtonColor: '#00e6a0', cancelButtonColor: '#9ca3af', confirmButtonText: 'Yes, deactivate' });
            if (!r.isConfirmed) return;
            try {
                await apiRequest('users/index.php?id=' + id, 'PUT', { status: 'inactive' });
                showAlert('User deactivated');
                loadUsers();
            } catch (err) { showAlert(err.message, 'error'); }
        }

        async function activateUser(id) {
            try {
                await apiRequest('users/index.php?id=' + id, 'PUT', { status: 'active' });
                showAlert('User activated');
                loadUsers();
            } catch (err) { showAlert(err.message, 'error'); }
        }

        loadBarangays();
        loadUsers();
    </script>
</body>
</html>
