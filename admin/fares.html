<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODASURE - Fare Rates</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>.swal2-popup{background:#0f172a!important;color:#f1f5f9!important}.swal2-title{color:#f1f5f9!important}.swal2-html-container{color:#94a3b8!important}</style>
</head>
<body>
    <button class="sidebar-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-icon"><i class="fa-solid fa-shield-halved"></i></div>
                <div>
                    <h2>TODASURE</h2>
                    <span>Admin Panel</span>
                </div>
            </div>
            <nav>
                <a href="dashboard.html"><i class="fa-solid fa-gauge icon"></i> Dashboard</a>
                <a href="drivers.html"><i class="fa-solid fa-id-card icon"></i> Drivers</a>
                <a href="tricycles.html"><i class="fa-solid fa-motorcycle icon"></i> Tricycles</a>
                <a href="toda.html"><i class="fa-solid fa-building icon"></i> TODA</a>
                <a href="trips.html"><i class="fa-solid fa-route icon"></i> Trips</a>
                <a href="fares.html" class="active"><i class="fa-solid fa-peso-sign icon"></i> Fare Rates</a>
                <a href="complaints.html"><i class="fa-solid fa-triangle-exclamation icon"></i> Complaints</a>
                <a href="violations.html"><i class="fa-solid fa-gavel icon"></i> Violations</a>
                <a href="users.html"><i class="fa-solid fa-users icon"></i> Passengers</a>
                <a href="barangays.html"><i class="fa-solid fa-map-location-dot icon"></i> Barangays</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-header">
                <span class="page-title">Fare Rates</span>
                <div class="header-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search..." id="globalSearch">
                </div>
                <div class="header-actions">
                    <button class="header-icon-btn" id="notifBtn" title="Notifications">
                        <i class="fa-solid fa-bell"></i>
                    </button>
                    <div class="profile-dropdown">
                        <button class="profile-btn" id="profileBtn">
                            <div class="profile-avatar" id="profileInitial">A</div>
                            <div class="profile-info">
                                <div class="profile-name" id="profileName">Admin</div>
                                <div class="profile-role">Administrator</div>
                            </div>
                            <i class="fa-solid fa-chevron-down chevron"></i>
                        </button>
                        <div class="dropdown-menu" id="profileMenu">
                            <a href="#"><i class="fa-solid fa-user"></i> Account Profile</a>
                            <div class="divider"></div>
                            <button class="danger" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="page-body">
                <div class="card">
                    <div class="card-header" style="display:flex;justify-content:space-between;align-items:center;">
                        <h3><i class="fa-solid fa-peso-sign" style="color:var(--accent);margin-right:8px;"></i>Fare Rates</h3>
                        <button class="btn btn-primary btn-sm" onclick="openAddModal()"><i class="fa-solid fa-plus" style="margin-right:4px;"></i> Add Rate</button>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Barangay</th>
                                    <th>Base Fare</th>
                                    <th>Base Distance</th>
                                    <th>Per KM Rate</th>
                                    <th>Senior Discount</th>
                                    <th>Effective Date</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="faresTable">
                                <tr><td colspan="8" class="text-center text-muted">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="fareModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Add Fare Rate</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="fareForm">
                <input type="hidden" id="fareId">
                <div class="form-group">
                    <label>Barangay *</label>
                    <select id="barangayId" class="form-control" required>
                        <option value="">Select Barangay</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Base Fare (PHP) *</label>
                        <input type="number" step="0.01" id="baseFare" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Base Distance (KM) *</label>
                        <input type="number" step="0.01" id="baseDistance" class="form-control" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Per KM Rate (PHP) *</label>
                        <input type="number" step="0.01" id="perKmRate" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Senior/PWD Discount (%)</label>
                        <input type="number" step="0.01" id="discountSenior" class="form-control" value="20">
                    </div>
                </div>
                <div class="form-group">
                    <label>Effective Date *</label>
                    <input type="date" id="effectiveDate" class="form-control" required>
                </div>
                <div class="flex gap-2" style="justify-content:flex-end; margin-top:16px;">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/guard.js"></script>
    <script src="../assets/js/api.js"></script>
    <script>
        // Sidebar toggle
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('show');
            this.classList.add('hide');
        });
        document.getElementById('sidebarOverlay').addEventListener('click', function() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');
            document.getElementById('sidebarToggle').classList.remove('hide');
});
        // Close sidebar when nav link clicked (mobile)
        document.querySelectorAll('.sidebar nav a').forEach(function(link) {
            link.addEventListener('click', function() {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebarOverlay').classList.remove('show');
            });
        });

        // Profile dropdown
        document.getElementById('profileBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('profileMenu').classList.toggle('show');
        });
        document.addEventListener('click', function() {
            document.getElementById('profileMenu').classList.remove('show');
        });

        // Load profile
        (async function() {
            try {
                var s = await auth.session();
                var n = ((s.first_name||'') + ' ' + (s.last_name||'')).trim();
                document.getElementById('profileName').textContent = n || 'Admin';
                document.getElementById('profileInitial').textContent = (s.first_name||'A')[0].toUpperCase();
            } catch(e) {}
        })();

        // SweetAlert showAlert
        window.showAlert = function(msg, type) {
            Swal.mixin({ toast:true, position:'top-end', showConfirmButton:false, timer:3000, timerProgressBar:true })
                .fire({ icon: type==='error'?'error':'success', title: msg });
        };

        // Logout
        async function handleLogout() {
            var r = await Swal.fire({ title:'Logout?', text:'Are you sure?', icon:'question', showCancelButton:true, confirmButtonColor:'#00e6a0', cancelButtonColor:'#9ca3af', confirmButtonText:'Yes, logout' });
            if (r.isConfirmed) { await auth.logout(); localStorage.removeItem('user'); window.location.replace('/TodaShare/login.html'); }
        }

        async function loadBarangays() {
            const list = await barangays.list();
            const sel = document.getElementById('barangayId');
            list.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b.id;
                opt.textContent = b.name;
                sel.appendChild(opt);
            });
        }

        async function loadFares() {
            try {
                const list = await fares.list();
                const tbody = document.getElementById('faresTable');
                if (list.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">No fare rates</td></tr>';
                    return;
                }
                tbody.innerHTML = list.map(f => `
                    <tr>
                        <td>${f.barangay_name}</td>
                        <td>${formatCurrency(f.base_fare)}</td>
                        <td>${f.base_distance} km</td>
                        <td>${formatCurrency(f.per_km_rate)}</td>
                        <td>${f.discount_senior}%</td>
                        <td>${f.effective_date}</td>
                        <td><span class="${badgeClass(f.status)}">${f.status}</span></td>
                        <td><button class="btn btn-outline btn-sm" onclick="editFare(${f.id})">Edit</button></td>
                    </tr>
                `).join('');
            } catch (err) { showAlert(err.message, 'error'); }
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add Fare Rate';
            document.getElementById('fareForm').reset();
            document.getElementById('fareId').value = '';
            document.getElementById('fareModal').classList.add('active');
        }

        async function editFare(id) {
            const f = await fares.get(id);
            document.getElementById('modalTitle').textContent = 'Edit Fare Rate';
            document.getElementById('fareId').value = f.id;
            document.getElementById('barangayId').value = f.barangay_id;
            document.getElementById('baseFare').value = f.base_fare;
            document.getElementById('baseDistance').value = f.base_distance;
            document.getElementById('perKmRate').value = f.per_km_rate;
            document.getElementById('discountSenior').value = f.discount_senior;
            document.getElementById('effectiveDate').value = f.effective_date;
            document.getElementById('fareModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('fareModal').classList.remove('active');
        }

        document.getElementById('fareForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('fareId').value;
            const data = {
                barangay_id: document.getElementById('barangayId').value,
                base_fare: document.getElementById('baseFare').value,
                base_distance: document.getElementById('baseDistance').value,
                per_km_rate: document.getElementById('perKmRate').value,
                discount_senior: document.getElementById('discountSenior').value,
                effective_date: document.getElementById('effectiveDate').value
            };
            try {
                if (id) { await fares.update(id, data); showAlert('Fare rate updated'); }
                else { await fares.create(data); showAlert('Fare rate created'); }
                closeModal();
                loadFares();
            } catch (err) { showAlert(err.message, 'error'); }
        });

        loadBarangays();
        loadFares();
    </script>
</body>
</html>
